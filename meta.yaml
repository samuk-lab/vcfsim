{% set name = "vcfsim" %}
{% set version = "1.0.29.alpha" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/samuk-lab/vcfsim/archive/{{ version }}.tar.gz
  sha256: fae92d63c0138f6bb0cc1848abd83382cdb4ee947ddadd9dd312b3c208429d6d  # update for each release

build:
  entry_points:
    - vcfsim=vcfsim.__main__:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python
    - pip
  run:
    - python
    - numpy
    - msprime
    - tskit

test:
  imports:
    - vcfsim
  commands:
    - pip check
    - vcfsim --help
  requires:
    - pip

about:
  home: https://github.com/samuk-lab/vcfsim
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - Pie115
