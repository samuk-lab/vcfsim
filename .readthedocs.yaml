# Read the Docs configuration file for vcfsim
# See https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# This file is required so Read the Docs will run the build. Without it,
# the project silently falls back to a frozen previous build.

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

formats:
  - htmlzip
  - pdf

python:
  install:
    - requirements: docs/requirements.txt
